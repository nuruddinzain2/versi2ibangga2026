<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monitoring Pendataan SE2026 — Kota Banjarmasin</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Source+Serif+4:opsz@8..60&family=Inter:wght@400;500;600;700&display=swap');
:root{
--ink:#1c2630;
--paper:#ffe5be; /* Warna orange dibuat jauh lebih muda agar soft dan kontras */
--paper-raised:#ffffff;
--rule:#d8d2c4;
--accent:#b4452f;
--accent-soft:#f0ddd4;
--good:#3f6b4f;
--good-soft:#e1ebe2;
--warn:#a87b1f;
--warn-soft:#f3e8d2;
--muted:#6b6358;
--mono: 'IBM Plex Mono', monospace;
--serif: 'Source Serif 4', serif;
--sans: 'Inter', sans-serif;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;background:var(--paper);color:var(--ink);font-family:var(--sans);}
.wrap{max-width:1040px;margin:0 auto;padding:28px 20px 80px;}
header.page{ border-bottom:3px double var(--ink); padding-bottom:18px; margin-bottom:22px; }
.eyebrow{ font-family:var(--mono); font-size:14px; font-weight:700; letter-spacing:.14em; text-transform:uppercase; color:var(--accent); margin:0 0 10px; }
h1{ font-family:var(--serif); font-weight:900; font-size:clamp(32px,5vw,46px); line-height:1.08; margin:0 0 8px; letter-spacing:-.02em; }
.sub{font-size:14px;color:var(--muted);margin:0;}
.status-bar{ display:flex; align-items:center; gap:8px; font-family:var(--mono); font-size:11.5px; color:var(--muted); margin-bottom:18px; }
.status-dot.ok{background:var(--good);}
.status-dot.err{background:var(--accent);}
.status-dot.loading{background:var(--warn);animation:pulse 1s infinite ease-in-out;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.35;}}
#refreshBtn{ margin-left:auto; font-family:var(--mono); font-size:11px; color:var(--muted); background:transparent; border:1px solid var(--rule); border-radius:2px; padding:3px 10px; cursor:pointer; }
#refreshBtn:hover{border-color:var(--ink);color:var(--ink);}
.lookup{ background:var(--paper-raised); border:1px solid var(--rule); border-radius:3px; padding:20px 22px; margin-bottom:26px; box-shadow:0 1px 0 rgba(0,0,0,.02); }
.lookup-label{ font-family:var(--mono); font-size:11px; text-transform:uppercase; letter-spacing:.1em; color:var(--muted); margin:0 0 10px; display:block; }
.lookup-row{display:flex;gap:10px;}
#nipInput{ flex:1; font-family:var(--mono); font-size:17px; letter-spacing:.03em; padding:11px 14px; border:1.5px solid var(--ink); border-radius:2px; background:#fff; color:var(--ink); }
#nipInput:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft);}
#nipInput::placeholder{color:#a8a194;font-style:italic;}
#clearBtn{ font-family:var(--sans); font-size:13px; font-weight:600; color:var(--muted); background:transparent; border:1.5px solid var(--rule); border-radius:2px; padding:0 18px; cursor:pointer; }
#clearBtn:hover{border-color:var(--ink);color:var(--ink);}
.hint{font-size:12px;color:var(--muted);margin:10px 0 0;}
.hint b{color:var(--ink);font-family:var(--mono);font-weight:500;}
.empty-state{text-align:center;padding:50px 20px;color:var(--muted);}
.empty-state .glyph{font-family:var(--mono);font-size:28px;color:var(--rule);margin-bottom:10px;display:block;}
.empty-state p{margin:4px 0;font-size:13.5px;}
.not-found, .load-error{ background:var(--warn-soft); border:1px solid var(--warn); color:#5c4413; padding:14px 18px; border-radius:3px; font-size:13.5px; font-family:var(--mono); }
.load-error{background:var(--accent-soft);border-color:var(--accent);color:#7a2e1c;}
.tf-header{background:var(--ink);color:#fff;border-radius:3px 3px 0 0;padding:18px 22px;}
.tf-id{font-family:var(--mono);font-size:11px;color:#cfc6b4;letter-spacing:.06em;}
.tf-name{font-family:var(--serif);font-size:23px;font-weight:700;margin:4px 0 0;}
.tf-stats{display:flex;gap:24px;margin-top:14px;padding-top:14px;border-top:1px solid rgba(255,255,255,.18);}
.tf-stats .stat .num{color:#fff;}
.tf-stats .stat .lbl{color:#a8a194;}
.stat{font-family:var(--mono);}
.stat .num{font-size:19px;font-weight:600;color:var(--ink);display:block;}
.stat .lbl{font-size:10.5px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);}
.pml-list{background:var(--paper-raised);border:1px solid var(--rule);border-top:none;border-radius:0 0 3px 3px;overflow:hidden;}
.pml-card{border-bottom:1px solid var(--rule);cursor:pointer;user-select:none;}
.pml-card:last-child{border-bottom:none;}
.pml-card-top{display:flex;justify-content:space-between;align-items:center;gap:16px;padding:15px 22px;transition:background .15s ease;}
.pml-card-top:hover{background:#fbfaf6;}
.pml-card.open .pml-card-top{background:var(--good-soft);}
.pml-name-block .pml-name{font-family:var(--serif);font-size:17px;font-weight:700;margin:0;}
.pml-name-block .pml-meta{font-size:11.5px;color:var(--muted);margin-top:2px;}
.pml-name-block .pml-meta span{margin-right:12px;}
.pml-name-block .pml-meta b{color:var(--ink);font-weight:600;}
.pml-mini-stats{display:flex;gap:18px;flex-shrink:0;}
.mini-stat{font-family:var(--mono);text-align:right;}
.mini-stat .num{font-size:15px;font-weight:600;color:var(--ink);display:block;}
.mini-stat .lbl{font-size:9.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);}
.chevron{ font-family:var(--mono);font-size:12px;color:var(--muted); background:var(--paper);border:1px solid var(--rule);border-radius:50%; width:24px;height:24px;display:flex;align-items:center;justify-content:center; flex-shrink:0;transition:transform .2s ease; }
.pml-card.open .chevron{transform:rotate(180deg);}
.detail-wrap{max-height:0;overflow:hidden;transition:max-height .28s ease;}
.detail-wrap.open{max-height:5000px;}
.detail-inner{padding:0 22px 18px;}
table.ppl-table{width:100%;border-collapse:collapse;font-size:12.5px;}
table.ppl-table caption{text-align:left;font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);padding:10px 0 8px;}
table.ppl-table thead th{text-align:left;font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);border-bottom:1.5px solid var(--ink);padding:6px 8px;white-space:nowrap;}
table.ppl-table header th.num{text-align:right;}
table.ppl-table tbody td{padding:8px 8px;border-bottom:1px solid var(--rule);}
table.ppl-table tbody td.num{text-align:right;font-family:var(--mono);font-size:12px;}
table.ppl-table tbody tr:hover{background:#fbfaf6;}
.pct-bar-cell{display:flex;align-items:center;gap:7px;justify-content:flex-end;}
.pct-track{width:40px;height:5px;background:var(--rule);border-radius:3px;overflow:hidden;flex-shrink:0;}
.pct-fill{height:100%;background:var(--good);}
.pct-fill.low{background:var(--warn);}
footer.page{margin-top:40px;padding-top:14px;border-top:1px solid var(--rule);font-family:var(--mono);font-size:10.5px;color:var(--muted);letter-spacing:.03em;}
@media (max-width:600px){
.wrap{padding:16px 12px 60px;}
h1{font-size:clamp(24px,7vw,32px);}
.eyebrow{font-size:11.5px;}
.sub{font-size:12.5px;}
.status-bar{flex-wrap:wrap;font-size:10.5px;}
#refreshBtn{margin-left:0;}
.lookup{padding:14px 14px;}
.pml-card-top{flex-direction:column;align-items:flex-start;gap:10px;padding:13px 14px;}
.pml-mini-stats{gap:14px;width:100%;}
.tf-header{padding:14px 16px;}
.tf-stats{flex-wrap:wrap;gap:10px 16px;}
.tf-stats .stat{min-width:72px;}
.tf-name{font-size:19px;}
table.ppl-table{font-size:11px;}
.idsubsls-table{font-size:11px;}
.lookup-row{flex-direction:column;}
#clearBtn{padding:9px 18px;}
.detail-inner{padding:0 12px 14px;}
.pml-meta{display:flex;flex-direction:column;gap:3px;}
.pml-meta span{margin-right:0;}
}
@media (max-width:420px){
.pml-mini-stats{gap:10px;}
.mini-stat .num{font-size:13px;}
.tf-stats{gap:8px 12px;}
}
.update-badge{ display:inline-block; font-family:var(--mono); font-size:10px; color:#7a5c3a; background:#f5e6c8; border:1px solid #d4c4a0; border-radius:3px; padding:1px 7px; margin-left:8px; vertical-align:middle; white-space:nowrap; }
.update-badge.tf-badge{ color:#cfc6b4; background:rgba(255,255,255,.12); border-color:rgba(255,255,255,.25); }
.update-badge.pml-badge{ color:#5c4413; background:#f3e8d2; border-color:#d4c4a0; }
.update-badge.ppl-badge{ color:#3a5c3a; background:#e1ebe2; border-color:#b8d4b8; }
.ppl-row-expandable { cursor: pointer; user-select: none; transition: background .15s ease; }
.ppl-row-expandable:hover { background: #fbfaf6; }
.ppl-row-expandable.open { background: var(--good-soft); }
.chevron-small { display: inline-block; font-family: var(--mono); font-size: 10px; color: var(--muted); margin-right: 6px; transition: transform .2s ease; vertical-align: middle; }
.ppl-row-expandable.open .chevron-small { transform: rotate(180deg); }
.idsubsls-table { width: 100%; border-collapse: collapse; font-size: 11.5px; margin: 8px 0; }
.idsubsls-table thead th { padding: 6px 8px; text-align: left; font-family: var(--mono); font-size: 10px; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); border-bottom: 1px solid var(--rule); background: var(--accent-soft); white-space: nowrap; }
.idsubsls-table thead th.num { text-align: right; }
.idsubsls-table tbody td { padding: 6px 8px; border-bottom: 1px solid var(--rule); font-size: 11.5px; }
.idsubsls-table tbody td.num { text-align: right; font-family: var(--mono); font-size: 11px; }
.idsubsls-table tbody tr:hover { background: #f4f1e8; }
.gc-badge { display: inline-block; padding: 2px 10px; border-radius: 12px; font-family: var(--mono); font-size: 11px; font-weight: 600; text-align: center; min-width: 24px; }
.gc-badge.gc-1 { background: var(--good-soft); color: var(--good); border: 1px solid var(--good); }
.gc-badge.gc-0 { background: #f4f4f4; color: var(--muted); border: 1px solid #ddd; }
.table-scroll{ overflow-x:auto; -webkit-overflow-scrolling:touch; margin:0 -2px; }
.table-scroll table{ min-width:560px; }
</style>
</head>
<body>
<div class="wrap">
<header class="page">
<p class="eyebrow">Sensus Ekonomi 2026 · Kota Banjarmasin</p>
<h1>Monitoring Progress Pendataan</h1>
<p class="sub">Masukkan NIP Task Force untuk menampilkan seluruh PML dan PPL di bawahnya.</p>
</header>
<div class="status-bar">
<span class="status-dot loading" id="statusDot"></span>
<span id="statusText">Memuat data terbaru…</span>
<button id="refreshBtn" type="button">↻ Refresh data</button>
</div>
<div class="lookup">
<label class="lookup-label" for="nipInput">Cari berdasarkan NIP Task Force</label>
<div class="lookup-row">
<input id="nipInput" type="text" inputmode="numeric" placeholder="Ketik atau tempel NIP, contoh: 340062842" autocomplete="off" disabled>
<button id="clearBtn" type="button">Bersihkan</button>
</div>
<p class="hint" id="hintText">Memuat daftar Task Force…</p>
</div>
<div id="resultArea"></div>
<footer class="page">
DATA SUMBER: PROGRESS PPL · SE2026 — DIAMBIL LANGSUNG DARI GOOGLE SHEETS SAAT HALAMAN DIBUKA
</footer>
</div>
<script>
// ===== KONFIGURASI =====
const PROXY_URL = "https://api.allorigins.win/raw?url=";
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTXpVwhWEVGDNmGefdCjapaDYWD_b7V_KOdhpdIE2ZB2SzAmxD4u2oplc5rSzOyTGLm-0F-9XBxm8ja/pub?gid=2111234947&single=true&output=csv";
const CSV_URL_GC = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTXpVwhWEVGDNmGefdCjapaDYWD_b7V_KOdhpdIE2ZB2SzAmxD4u2oplc5rSzOyTGLm-0F-9XBxm8ja/pub?gid=611204204&single=true&output=csv";
const CSV_URL_UPDATE = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTXpVwhWEVGDNmGefdCjapaDYWD_b7V_KOdhpdIE2ZB2SzAmxD4u2oplc5rSzOyTGLm-0F-9XBxm8ja/pub?gid=0&single=true&output=csv";

const NIP_MAP = {"340019495":"M.TAUFIK R","132311851":"IMA","340015186":"NURUDDIN ZAIN","340015557":"SYAKERANI","340050198":"PRATIWI","340055352":"NOORHAMIMAH","340056117":"FARIDA AMINA","340016618":"DWI SETYO MAYLENA","340056874":"RAISA NOOR MAULIDA","340018139":"JUNAIDI EFENDI","340018823":"M.IQBAL","340055342":"DANY THERESA","340057558":"RISKA FINA AYUNINDA","340058750":"GHITA","340060168":"KHALISTA","340061619":"ADIMA LULUATUN","340063514":"SALMA AFNA H. H","340066120":"ANNISA","340066397":"NASYWA","340012390":"AL AMIN","340065201":"IMRON","340052140":"IRWAN","340065025":"SAFWAN","340016619":"JULIANA ADMAKA","340019091":"LISDA FITRIAWATI","340062842":"HENDRA"};
const STORAGE_KEY = 'se2026_nip_terakhir';

// ===== STATE =====
let DATA = [];
let gcMap = {};
let LAST_UPDATE_TIME = null;
let LAST_UPDATE_TEXT = '';

// ===== DOM REFS =====
const elInput = document.getElementById('nipInput');
const elResult = document.getElementById('resultArea');
const elClear = document.getElementById('clearBtn');
const elHint = document.getElementById('hintText');
const elStatusDot = document.getElementById('statusDot');
const elStatusText = document.getElementById('statusText');
const elRefreshBtn = document.getElementById('refreshBtn');

// ===== UTILITY FUNCTIONS =====
function fmt(n){ if(n===null||n===undefined||isNaN(n)) return '–'; return Number(n).toLocaleString('id-ID',{maximumFractionDigits:0}); }
function fmtDec(n){ if(n===null||n===undefined||isNaN(n)) return '–'; return Number(n).toLocaleString('id-ID',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function fmtPct(n){ if(n===null||n===undefined||isNaN(n)) return '–'; return Number(n).toLocaleString('id-ID',{minimumFractionDigits:2,maximumFractionDigits:2})+'%'; }
function escapeHtml(str){ if(str===null||str===undefined) return ''; return String(str).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function toNum(s){
    if (s===undefined||s===null) return null;
    s = String(s).trim();
    if (s === '') return null;
    // Buang karakter selain digit, titik, koma, dan minus (mis. spasi, Rp, dsb)
    s = s.replace(/[^\d.,\-]/g, '');
    if (s === '') return null;

    const lastDot = s.lastIndexOf('.');
    const lastComma = s.lastIndexOf(',');
    let decSep = null; // pemisah desimal yang terdeteksi, null = anggap semua pemisah grouping (ribuan)

    if (lastDot > -1 && lastComma > -1) {
        // Ada keduanya -> yang paling kanan adalah pemisah desimal, sisanya ribuan
        decSep = lastComma > lastDot ? ',' : '.';
    } else if (lastComma > -1 || lastDot > -1) {
        const sep = lastComma > -1 ? ',' : '.';
        const lastIdx = lastComma > -1 ? lastComma : lastDot;
        const tail = s.slice(lastIdx + 1);
        const sepCount = s.split(sep).length - 1;
        // Jika hanya satu pemisah dan diikuti TEPAT 3 digit -> kemungkinan besar ribuan (cth "1,000" / "1.000")
        // Jika diikuti 1-2 digit -> desimal (cth "12,5" / "0.50")
        // Jika lebih dari satu pemisah dengan 3 digit tiap grup -> ribuan bertingkat (cth "1.234.567")
        if (tail.length === 3 && sepCount === 1) {
            decSep = null; // anggap ribuan, BUKAN desimal -> "1,000" tetap 1000, bukan 1
        } else if (tail.length >= 1 && tail.length <= 2) {
            decSep = sep; // desimal
        } else {
            decSep = null; // grouping ribuan
        }
    }

    let cleaned;
    if (decSep === ',') {
        cleaned = s.replace(/\./g, '').replace(/,/g, '.');
    } else if (decSep === '.') {
        cleaned = s.replace(/,/g, '');
    } else {
        // Tidak ada pemisah desimal yang jelas -> buang semua titik/koma (anggap pemisah ribuan)
        cleaned = s.replace(/[.,]/g, '');
    }

    const n = parseFloat(cleaned);
    return isNaN(n) ? null : n;
}

function parseCSV(text) {
    // Parser karakter-per-karakter untuk SELURUH teks (bukan split per baris dulu).
    // Ini penting karena split('\n') sebelum memproses tanda kutip akan memecah baris
    // secara keliru jika ada sel (mis. kolom keterangan/GC) yang berisi newline atau
    // koma di dalam tanda kutip -- akibatnya kolom-kolom sesudahnya (termasuk BB) ikut bergeser/hilang.
    const rows = [];
    let row = [];
    let field = '';
    let inQuotes = false;

    for (let i = 0; i < text.length; i++) {
        const char = text[i];

        if (inQuotes) {
            if (char === '"') {
                if (text[i + 1] === '"') { field += '"'; i++; }
                else { inQuotes = false; }
            } else {
                field += char;
            }
            continue;
        }

        if (char === '"') {
            inQuotes = true;
        } else if (char === ',') {
            row.push(field.trim());
            field = '';
        } else if (char === '\r') {
            // dilewati, ditangani via \n
        } else if (char === '\n') {
            row.push(field.trim());
            field = '';
            rows.push(row);
            row = [];
        } else {
            field += char;
        }
    }
    // Dorong field/baris terakhir jika file tidak diakhiri newline
    if (field.length > 0 || row.length > 0) {
        row.push(field.trim());
        rows.push(row);
    }

    // Buang baris yang benar-benar kosong (hasil baris blank di CSV)
    return rows.filter(r => !(r.length === 1 && r[0] === ''));
}

function setStatus(state, text){
    elStatusDot.className = 'status-dot ' + state;
    let updateInfo = '';
    if (LAST_UPDATE_TEXT) {
        updateInfo = ' · ' + LAST_UPDATE_TEXT;
    } else if (LAST_UPDATE_TIME && state === 'ok') {
        const d = new Date(LAST_UPDATE_TIME);
        updateInfo = ' · diperbarui ' + d.toLocaleString('id-ID', {day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit'});
    }
    elStatusText.textContent = text + updateInfo;
}

function getUpdateBadge(type='default'){
    if (!LAST_UPDATE_TIME && !LAST_UPDATE_TEXT) return '';
    let timeText = '';
    if (LAST_UPDATE_TEXT) {
        timeText = LAST_UPDATE_TEXT;
    } else if (LAST_UPDATE_TIME) {
        const date = new Date(LAST_UPDATE_TIME);
        const now = new Date();
        const diffMs = now - date;
        const diffMins = Math.floor(diffMs / 60000);
        const diffHours = Math.floor(diffMs / 3600000);
        const diffDays = Math.floor(diffMs / 86400000);
        if (diffMins < 1) timeText = 'baru saja';
        else if (diffMins < 60) timeText = diffMins + ' menit lalu';
        else if (diffHours < 24) timeText = diffHours + ' jam lalu';
        else timeText = diffDays + ' hari lalu';
    }
    const fullDate = LAST_UPDATE_TIME ? new Date(LAST_UPDATE_TIME).toLocaleString('id-ID', { day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' }) : '';
    const typeClass = type === 'tf' ? 'tf-badge' : type === 'pml' ? 'pml-badge' : type === 'ppl' ? 'ppl-badge' : '';
    return `<span class="update-badge ${typeClass}" title="${fullDate ? 'Diperbarui: ' + fullDate : ''}">${timeText}</span>`;
}

function refreshUpdateBadges() {
    if (!LAST_UPDATE_TIME && !LAST_UPDATE_TEXT) return;
    let timeText = '';
    if (LAST_UPDATE_TEXT) {
        timeText = LAST_UPDATE_TEXT;
    } else if (LAST_UPDATE_TIME) {
        const date = new Date(LAST_UPDATE_TIME);
        const now = new Date();
        const diffMs = now - date;
        const diffMins = Math.floor(diffMs / 60000);
        const diffHours = Math.floor(diffMs / 3600000);
        const diffDays = Math.floor(diffMs / 86400000);
        if (diffMins < 1) timeText = 'baru saja';
        else if (diffMins < 60) timeText = diffMins + ' menit lalu';
        else if (diffHours < 24) timeText = diffHours + ' jam lalu';
        else timeText = diffDays + ' hari lalu';
    }
    const fullDate = LAST_UPDATE_TIME ? new Date(LAST_UPDATE_TIME).toLocaleString('id-ID', { day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' }) : '';
    document.querySelectorAll('.update-badge').forEach(badge => {
        badge.textContent = timeText;
        badge.title = fullDate ? 'Diperbarui: ' + fullDate : '';
    });
    if (elStatusDot.classList.contains('ok')) {
        let updateInfo = '';
        if (LAST_UPDATE_TEXT) {
            updateInfo = ' · ' + LAST_UPDATE_TEXT;
        } else if (LAST_UPDATE_TIME) {
            const d = new Date(LAST_UPDATE_TIME);
            updateInfo = ' · diperbarui ' + d.toLocaleString('id-ID', { day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit' });
        }
        elStatusText.textContent = 'Data termuat · ' + DATA.length.toLocaleString('id-ID') + ' baris PPL' + updateInfo;
    }
}

// ===== DATA LOADING =====
async function loadUpdateInfo() {
    try {
        const url = PROXY_URL + encodeURIComponent(CSV_URL_UPDATE + '&_=' + Date.now());
        const res = await fetch(url, {cache:'no-store'});
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const text = await res.text();
        const grid = parseCSV(text);
        if (grid.length > 0 && grid[0].length > 0) {
            const updateText = String(grid[0][0] || '').trim();
            if (updateText) {
                LAST_UPDATE_TEXT = updateText;
            }
        }
    } catch (err) {
        console.warn('⚠️ Gagal memuat update info:', err);
    }
}

async function loadGCData() {
    try {
        const url = PROXY_URL + encodeURIComponent(CSV_URL_GC + '&_=' + Date.now());
        const res = await fetch(url, {cache:'no-store'});
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const text = await res.text();
        const grid = parseCSV(text);

        gcMap = {};
        if (grid.length === 0) return;

        // Default: Kolom AQ = ID SUBSLS (indeks 42), Kolom BB = Keterangan GC (indeks 53)
        let idsubColIdx = 42;
        let gcColIdx = 53;

        // Coba deteksi otomatis dari baris header (kalau ada teks header yang cocok),
        // supaya kalau urutan kolom di sheet berubah, lookup GC tidak ikut rusak.
        const headerRow = grid[0] || [];
        headerRow.forEach((h, i) => {
            const hLow = String(h || '').toLowerCase().trim();
            if (hLow === 'id subsls' || hLow === 'idsubsls' || hLow === 'id_subsls') idsubColIdx = i;
            if (hLow.includes('ket') && hLow.includes('gc')) gcColIdx = i;
            else if (hLow === 'gc' || hLow === 'keterangan gc') gcColIdx = i;
        });

        const maxIdx = Math.max(idsubColIdx, gcColIdx);
        let matched = 0;

        for (let i = 0; i < grid.length; i++) {
            let cols = grid[i];
            if (!cols) continue;
            // Padding: jika baris lebih pendek dari kolom yang dibutuhkan (kolom kosong di akhir
            // kadang ikut terpotong saat export CSV), isi dengan string kosong agar tidak hilang begitu saja.
            if (cols.length <= maxIdx) {
                cols = cols.concat(new Array(maxIdx - cols.length + 1).fill(''));
            }

            const idsub = String(cols[idsubColIdx] || '').trim();
            const ketGC = String(cols[gcColIdx] || '').trim();

            if (idsub && !['nip','region_code','id subsls','idsubsls'].includes(idsub.toLowerCase())) {
                gcMap[idsub] = ketGC;
                matched++;
            }
        }

        console.info('[GC] Kolom ID SUBSLS terdeteksi di indeks ' + idsubColIdx + ', Kolom Ket.GC di indeks ' + gcColIdx + ' · ' + matched + ' baris terpetakan.');
    } catch (err) {
        console.error('❌ Gagal memuat sheet GC:', err);
    }
}

async function loadData(){
    setStatus('loading', 'Memuat data terbaru…');
    elInput.disabled = true;
    try{
        const url = PROXY_URL + encodeURIComponent(CSV_URL + '&_=' + Date.now());
        const res = await fetch(url, {cache:'no-store'});
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const text = await res.text();
        const grid = parseCSV(text);
        
        let headerRowIdx = -1;
        for (let i = 0; i < Math.min(20, grid.length); i++) {
            const row = grid[i];
            if (!row) continue;
            const rowStr = row.join(',').toLowerCase();
            if (rowStr.includes('kecamatan') || rowStr.includes('kec')) {
                headerRowIdx = i;
                break;
            }
        }
        if (headerRowIdx === -1) headerRowIdx = 0;
        
        const rows = [];
        for (let r = headerRowIdx + 1; r < grid.length; r++){
            const cols = grid[r];
            if (!cols || cols.length < 5) continue;
            
            const kec = (cols[0]||'').trim();
            const tf = (cols[1]||'').trim();
            const pml = (cols[2]||'').trim();
            const ppl = (cols[4]||'').trim();
            
            // PERBAIKAN: Gunakan pembacaan yang lebih aman tanpa memotong batasan length yang ketat
            let idsubsls = '';
            if (cols.length > 42) {
                idsubsls = String(cols[42] || '').trim();
            }
            
            if (!pml || !ppl) continue;
            if (/total/i.test(pml)) continue;
            
            rows.push({
                kec, tf, pml, ppl, idsubsls,
                target: toNum(cols[5]),
                kirim: toNum(cols[6]),
                draft: toNum(cols[7]),
                rata: toNum(cols[8]),
                persen: toNum(cols[9]),
            });
        }
        
        if (rows.length === 0) throw new Error('Data kosong setelah parsing');
        DATA = rows;
        LAST_UPDATE_TIME = Date.now();
        setStatus('ok', 'Data termuat · ' + rows.length.toLocaleString('id-ID') + ' baris PPL');
        elInput.disabled = false;
        elHint.innerHTML = 'Total <b>' + Object.keys(NIP_MAP).length.toLocaleString('id-ID') + '</b> Task Force terdaftar dengan NIP.';
        
        const savedNip = loadSavedNip();
        if (savedNip){ 
            elInput.value = savedNip; 
            doSearch(); 
        } else { 
            renderEmpty(); 
        }
    }catch(err){
        console.error('❌ Error:', err);
        setStatus('err', 'Gagal memuat data');
        elResult.innerHTML = '<div class="load-error">❌ Gagal mengambil data: ' + escapeHtml(err.message) + '</div>';
        elInput.disabled = false;
    }
}

// ===== RENDER FUNCTIONS =====
function renderEmpty(){
    elResult.innerHTML = '<div class="empty-state"><span class="glyph">[ ? ]</span><p>Belum ada NIP yang dicari.</p></div>';
}

function renderNotFound(nip){
    elResult.innerHTML = '<div class="not-found">❌ NIP "' + escapeHtml(nip) + '" tidak ditemukan dalam daftar Task Force.</div>';
}

function renderResult(nip, tfName){
    const tfNameNorm = tfName.trim();
    const teamRows = DATA.filter(r => r.tf.trim().toUpperCase() === tfNameNorm.toUpperCase());
    if (teamRows.length === 0){
        elResult.innerHTML = '<div class="not-found">⚠️ Task Force ' + escapeHtml(tfNameNorm) + ' tidak memiliki data PPL.</div>';
        return;
    }
    
    const kec = teamRows[0].kec;
    const totalTarget = teamRows.reduce((s,r)=> s + (r.target||0), 0);
    const totalKirim = teamRows.reduce((s,r)=> s + (r.kirim||0), 0);
    const totalDraft = teamRows.reduce((s,r)=> s + (r.draft||0), 0);
    const avgPersen = totalTarget > 0 ? (totalKirim/totalTarget*100) : 0;
    const progressIncDraft = totalTarget > 0 ? (((totalKirim + totalDraft) / totalTarget) * 100) : 0;
    
    const pmlGroups = {};
    teamRows.forEach(r => { (pmlGroups[r.pml] = pmlGroups[r.pml] || []).push(r); });
    
    const pmlCardsHtml = Object.entries(pmlGroups).map(([pmlName, pplRows], idx) => {
        const pmlTarget = pplRows.reduce((s,r)=> s + (r.target||0), 0);
        const pmlKirim = pplRows.reduce((s,r)=> s + (r.kirim||0), 0);
        const pmlPersen = pmlTarget > 0 ? (pmlKirim/pmlTarget*100) : 0;
        const pmlDraft = pplRows.reduce((s,r)=> s + (r.draft||0), 0);
        const pmlPersenKD = pmlTarget > 0 ? (((pmlKirim + pmlDraft) / pmlTarget) * 100) : 0;
        
        const pplGroups = {};
        pplRows.forEach(r => {
            if (!pplGroups[r.ppl]) pplGroups[r.ppl] = [];
            pplGroups[r.ppl].push(r);
        });
        
        const rowsHtml = Object.entries(pplGroups).map(([pplName, idsubRows]) => {
            const pplTarget = idsubRows.reduce((s,r) => s + (r.target||0), 0);
            const pplKirim = idsubRows.reduce((s,r) => s + (r.kirim||0), 0);
            const pplDraft = idsubRows.reduce((s,r) => s + (r.draft||0), 0);
            const pplRata = idsubRows.reduce((s,r) => s + (r.rata||0), 0);
            
            const pplPersenKirim = pplTarget > 0 ? (pplKirim / pplTarget * 100) : 0;
            const pplPersenKirimDraft = pplTarget > 0 ? (((pplKirim + pplDraft) / pplTarget) * 100) : 0;
            
            const pctClassKirim = pplPersenKirim < 2 ? 'low' : '';
            const pctClassKirimDraft = pplPersenKirimDraft < 2 ? 'low' : '';
            
            const idsubRowsHtml = idsubRows.map(r => {
                const pct = r.target > 0 ? (r.kirim / r.target * 100) : 0;
                const pctClassSub = pct < 2 ? 'low' : '';
                const pctKD = r.target > 0 ? (((r.kirim||0) + (r.draft||0)) / r.target * 100) : 0;
                const pctClassSubKD = pctKD < 2 ? 'low' : '';
                
                // Ambil ID dan bersihkan strip bawaan jika ada
                let finalIdSubsls = String(r.idsubsls || '').trim();
                if (!finalIdSubsls || finalIdSubsls === '-') {
                    finalIdSubsls = '<span style="color:#aaa; font-style:italic;">Kosong</span>';
                }
                
                let gcKeterangan = '<span style="color:#aaa;">-</span>';
                const lookupKey = String(r.idsubsls || '').trim();
                
                if (lookupKey && lookupKey !== '-') {
                    const gcVal = gcMap[lookupKey] !== undefined ? String(gcMap[lookupKey]).trim() : '';
                    if (gcVal === '1') {
                        gcKeterangan = '<span class="gc-badge gc-1">1</span>';
                    } else if (gcVal === '0') {
                        gcKeterangan = '<span class="gc-badge gc-0">0</span>';
                    } else if (gcVal !== '' && gcVal !== '-') {
                        gcKeterangan = escapeHtml(gcVal);
                    }
                }
                
                return '<tr><td>' + finalIdSubsls + '</td><td>' + gcKeterangan + '</td><td class="num">' + fmt(r.target) + '</td><td class="num">' + fmt(r.kirim) + '</td><td class="num">' + fmt(r.draft) + '</td><td class="num">' + fmtDec(r.rata) + '</td><td class="num"><div class="pct-bar-cell"><span>' + fmtPct(pct) + '</span><span class="pct-track"><span class="pct-fill ' + pctClassSub + '" style="width:' + Math.min(pct,100) + '%"></span></span></div></td><td class="num"><div class="pct-bar-cell"><span>' + fmtPct(pctKD) + '</span><span class="pct-track"><span class="pct-fill ' + pctClassSubKD + '" style="width:' + Math.min(pctKD,100) + '%"></span></span></div></td></tr>';
            }).join('');
            
            return '<tr class="ppl-row-expandable"><td><span class="chevron-small">▾</span> ' + escapeHtml(pplName) + ' ' + getUpdateBadge('ppl') + '</td><td class="num">' + fmt(pplTarget) + '</td><td class="num">' + fmt(pplKirim) + '</td><td class="num">' + fmt(pplDraft) + '</td><td class="num">' + fmtDec(pplRata) + '</td><td class="num"><div class="pct-bar-cell"><span>' + fmtPct(pplPersenKirim) + '</span><span class="pct-track"><span class="pct-fill ' + pctClassKirim + '" style="width:' + Math.min(pplPersenKirim,100) + '%"></span></span></div></td><td class="num"><div class="pct-bar-cell"><span>' + fmtPct(pplPersenKirimDraft) + '</span><span class="pct-track"><span class="pct-fill ' + pctClassKirimDraft + '" style="width:' + Math.min(pplPersenKirimDraft,100) + '%"></span></span></div></td></tr><tr class="ppl-detail-row" style="display:none;"><td colspan="7" style="padding: 0 12px 12px 12px; background: #fbfaf6;"><div class="table-scroll"><table class="idsubsls-table"><thead><tr><th>ID SUBSLS</th><th>Ket. GC</th><th class="num">Target</th><th class="num">Dikirim</th><th class="num">Draft</th><th class="num">Rata²/Hari</th><th class="num">Progress Kirim</th><th class="num">Progress Kirim+Draft</th></tr></thead><tbody>' + idsubRowsHtml + '</tbody></table></div></td></tr>';
        }).join('');
        
        return '<div class="pml-card" data-idx="' + idx + '"><div class="pml-card-top"><div class="pml-name-block"><p class="pml-name">' + escapeHtml(pmlName) + ' ' + getUpdateBadge('pml') + '</p><div class="pml-meta"><span><b>' + Object.keys(pplGroups).length + '</b> PPL</span><span>Kirim: <b>' + fmtPct(pmlPersen) + '</b></span><span>Kirim+Draft: <b>' + fmtPct(pmlPersenKD) + '</b></span></div></div><div class="pml-mini-stats"><div class="mini-stat"><span class="num">' + fmt(pmlTarget) + '</span><span class="lbl">Target</span></div><div class="mini-stat"><span class="num">' + fmt(pmlKirim) + '</span><span class="lbl">Dikirim</span></div></div><div class="chevron">▾</div></div><div class="detail-wrap"><div class="detail-inner"><div class="table-scroll"><table class="ppl-table"><caption>Seluruh PPL di bawah ' + escapeHtml(pmlName) + '</caption><thead><tr><th>PPL</th><th class="num">Target</th><th class="num">Dikirim</th><th class="num">Draft</th><th class="num">Rata²/Hari</th><th class="num">Progress Kirim</th><th class="num">Progress Kirim+Draft</th></tr></thead><tbody>' + rowsHtml + '</tbody></table></div></div></div></div>';
    }).join('');
    
    elResult.innerHTML = '<div class="tf-header"><div class="tf-id">' + escapeHtml(kec) + ' · NIP ' + escapeHtml(nip) + '</div><p class="tf-name">' + escapeHtml(tfNameNorm) + ' ' + getUpdateBadge('tf') + '</p><div class="tf-stats"><div class="stat"><span class="num">' + Object.keys(pmlGroups).length + '</span><span class="lbl">PML</span></div><div class="stat"><span class="num">' + teamRows.length + '</span><span class="lbl">Total PPL</span></div><div class="stat"><span class="num">' + fmt(totalTarget) + '</span><span class="lbl">Target</span></div><div class="stat"><span class="num">' + fmt(totalKirim) + '</span><span class="lbl">Dikirim</span></div><div class="stat"><span class="num">' + fmt(totalDraft) + '</span><span class="lbl">Draft</span></div><div class="stat"><span class="num">' + fmtPct(avgPersen) + '</span><span class="lbl">Progress</span></div><div class="stat"><span class="num">' + fmtPct(progressIncDraft) + '</span><span class="lbl">Prog. + Draft</span></div></div></div><div class="pml-list">' + pmlCardsHtml + '</div>';
    
    document.querySelectorAll('.pml-card').forEach(card => {
        const top = card.querySelector('.pml-card-top');
        const detail = card.querySelector('.detail-wrap');
        top.addEventListener('click', () => {
            const isOpen = card.classList.toggle('open');
            detail.classList.toggle('open', isOpen);
        });
    });
    
    document.querySelectorAll('.ppl-row-expandable').forEach(row => {
        row.addEventListener('click', (e) => {
            const detailRow = row.nextElementSibling;
            if (detailRow && detailRow.classList.contains('ppl-detail-row')) {
                const isHidden = detailRow.style.display === 'none';
                detailRow.style.display = isHidden ? 'table-row' : 'none';
                row.classList.toggle('open', isHidden);
            }
        });
    });
    refreshUpdateBadges();
}

// ===== SEARCH FUNCTIONS =====
function doSearch(){
    const raw = elInput.value.trim();
    if (!raw){ renderEmpty(); return; }
    const tfName = NIP_MAP[raw];
    if (!tfName){ renderNotFound(raw); return; }
    renderResult(raw, tfName);
}

function saveNip(nip){
    try{ if (nip){ localStorage.setItem(STORAGE_KEY, nip); } else { localStorage.removeItem(STORAGE_KEY); } }catch(e){}
}

function loadSavedNip(){
    try{ return localStorage.getItem(STORAGE_KEY) || ''; }catch(e){ return ''; }
}

// ===== EVENT LISTENERS =====
elInput.addEventListener('input', () => { doSearch(); saveNip(elInput.value.trim()); });
elInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { e.preventDefault(); doSearch(); }
});

elClear.addEventListener('click', () => { 
    elInput.value=''; 
    elInput.focus(); 
    renderEmpty(); 
    saveNip(''); 
});

elRefreshBtn.addEventListener('click', () => {
    LAST_UPDATE_TEXT = '';
    loadUpdateInfo().then(() => {
        loadGCData().finally(() => loadData());
    });
});

// ===== STARTUP =====
setInterval(refreshUpdateBadges, 30000);
loadUpdateInfo().then(() => {
    loadGCData().finally(() => loadData());
});
</script>
